format_version: 2
handoff_dir: ../out/cubed-sphere-crust-state-42/regional-handoffs/canonical-l2
output_dir: ../out/cubed-sphere-crust-state-42/l3-targets/temperate-highland-catchment
terrain_output_dir: ../out/cubed-sphere-crust-state-42/l3/temperate-highland-catchment/base-terrain
hydrology_output_dir: ../out/cubed-sphere-crust-state-42/l3/temperate-highland-catchment/hydrology-v0
channel_geometry_output_dir: ../out/cubed-sphere-crust-state-42/l3/temperate-highland-catchment/channel-geometry-v0
target:
  id: temperate-highland-catchment
  # Chosen from seed 42 by catchment completeness, runoff, relief, water,
  # climate contrast, compactness, and workstation-scale raster cost.
  outlet_parent_cell_id: 80324
  context_parent_rings: 2
  minimum_area_km2: 90000
  maximum_area_km2: 115000
grid:
  base_cell_size_m: 200
  # 2048 x 22 gives an area-equivalent cell width of approximately 198 m
  # over the selected catchment. L3 IDs therefore require uint64.
  l3_refinement_factor: 22
  adaptive_minimum_cell_size_m: 25
  adaptive_maximum_cell_size_m: 50
  # Store a continuous rectangle around the irregular catchment. Four L2
  # cells are about 18 km; one additional L2 ring supplies interpolation data.
  terrain_window_halo_l2_cells: 4
  terrain_source_context_l2_cells: 1
  # Route the complete stored rectangle, then crop this four-L2-cell outer
  # band from maps. Every visible pixel therefore has relief and hydrology.
  display_boundary_halo_l2_cells: 4
terrain:
  seed: 4203001
  chunk_parent_count: 64
  relief_realization_fraction: 0.42
  base_wavelength_m: 16000
  octave_count: 5
  persistence: 0.52
  domain_warp_fraction: 0.22
  orogenic_ridge_fraction: 0.32
  orogenic_reference_m: 1500
  # L2 means are probabilistic regional constraints. Exact per-parent
  # correction creates a visible 4.3 km tile embossing at L3.
  maximum_parent_mean_error_m: 15
  maximum_parent_mean_error_relief_fraction: 0.05
  maximum_parent_area_relative_error: 1.0e-9
  # Higher-amplitude L2 morphology raises boundary/interior ratios slightly;
  # retain an independent absolute ceiling so this cannot hide a real seam.
  maximum_parent_boundary_residual_p95_ratio: 1.45
  maximum_parent_boundary_residual_p95_m: 20
  # This is a smaller statistical subset of L2 boundaries. Exact alternate-
  # partition replay remains the hard chunk-seam gate.
  maximum_chunk_boundary_residual_p95_ratio: 1.50
  maximum_cell_size_relative_error: 0.12
  minimum_terrain_offset_std_m: 2.0
  maximum_tile_bubble_correlation_p50: 0.35
  maximum_tile_bubble_correlation_p95: 0.80
  conditioning_maximum_iterations: 24
  conditioning_damping: 0.72
  maximum_center_correction_relief_fraction: 0.75
hydrology:
  chunk_rows: 262144
  # Monthly forcing conserves represented L0 water volume exactly, while these
  # bounded weights distribute it across L3 terrain without a new climate run.
  orographic_runoff_weight: 0.28
  orographic_precipitation_weight: 0.20
  highland_melt_weight: 0.22
  minimum_depression_depth_m: 3.0
  wetland_mean_depth_m: 2.5
  endorheic_aridity_threshold: 0.35
  maximum_fill_time_years: 10000
  lake_seepage_mm_year: 30
  subgrid_relief_scale: 0.10
  subgrid_connected_basin_fraction: 1.0
  breach_score_threshold: 0.10
  # Per-event incision remains bounded independently from cumulative relaxation.
  maximum_breach_incision_m: 80
  maximum_cumulative_breach_incision_m: 160
  breach_length_cells: 12
  # Repeated passes let filled depressions spill and bounded breaches propagate
  # downstream; one pass strands nearly every tributary in local L3 roughness.
  maximum_breach_rounds: 20
  # Rivers remain graph/vector features. These thresholds decide which routed
  # paths are reported, not which 200 m cells are categorically water.
  river_discharge_threshold_m3s: 2.0
  river_contributing_area_threshold_km2: 20.0
  river_minimum_discharge_m3s: 0.15
  maximum_forcing_conservation_relative_error: 1.0e-6
  maximum_runoff_conservation_relative_error: 1.0e-6
  # The 72 km inherited envelope selects the basin; routing refines its true
  # divide inside the halo instead of manufacturing a block-aligned wall.
  # The 72 km inherited basin is an anchor, not a hard 200 m watershed mask.
  # Select the natural L3 basin with the greatest area overlap and require it
  # to be unambiguously dominant while preserving most of the coarse target.
  minimum_inherited_core_retained_fraction: 0.65
  minimum_routed_core_inherited_fraction: 0.75
  minimum_dominant_to_second_basin_overlap_ratio: 3.0
  minimum_routed_to_inherited_area_ratio: 0.80
  maximum_routed_to_inherited_area_ratio: 1.20
  maximum_routed_core_process_boundary_contact_fraction: 0.001
  maximum_outlet_hydrograph_relative_error: 0.40
  maximum_core_open_water_fraction: 0.10
channel_geometry:
  smoothing_iterations: 2
  maximum_centerline_offset_cells: 0.75
  minimum_centerline_length_ratio: 0.70
  maximum_centerline_length_ratio: 1.01
  active_month_discharge_m3s: 0.15
  reliable_flow_minimum_active_months: 6
  riparian_position_between_channel_and_floodplain: 0.35
limits:
  maximum_base_cell_count: 7000000
  maximum_peak_memory_gb: 24
  maximum_terrain_storage_gb: 2
  maximum_hydrology_storage_gb: 4
  maximum_channel_geometry_storage_gb: 2
